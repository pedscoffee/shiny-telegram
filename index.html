<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Clinical SmartPhrase - AI-powered clinical documentation tool for physicians">
  <meta name="theme-color" content="#007ba7">
  <title>Clinical SmartPhrase - AI Documentation Tool</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕</text></svg>">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #root {
      min-height: 100vh;
    }
    .loading-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .loading-content {
      text-align: center;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e9ecef;
      border-top: 4px solid #007ba7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #495057;
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-fallback">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Clinical SmartPhrase...</div>
      </div>
    </div>
  </div>

  <!-- React and Babel for JSX transformation -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Main Application -->
  <script type="text/babel">
    import ClinicalSmartPhrase from './clinical-smartphrase.jsx';
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ClinicalSmartPhrase />);
  </script>

  <!-- Service Worker Registration for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => console.log('SW registered:', registration))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
